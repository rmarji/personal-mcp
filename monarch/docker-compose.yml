services:
  monarch-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MONARCH_EMAIL=${MONARCH_EMAIL}
      - MONARCH_PASSWORD=${MONARCH_PASSWORD}
      - MONARCH_MFA_SECRET=${MONARCH_MFA_SECRET}
    volumes:
      - monarch-session:/app/.mm
    networks:
      - coolify
    labels:
      # Traefik routing
      - traefik.enable=true
      - traefik.http.routers.monarch-mcp.rule=Host(`monarch.claw.jogeeks.com`)
      - traefik.http.routers.monarch-mcp.entrypoints=https
      - traefik.http.routers.monarch-mcp.tls=true
      - traefik.http.routers.monarch-mcp.tls.certresolver=letsencrypt
      - traefik.http.routers.monarch-mcp.service=monarch-mcp
      - traefik.http.services.monarch-mcp.loadbalancer.server.port=8000
      # Shared basic auth middleware (same name on both stacks = Traefik dedupes)
      # Hash below: user=rayo. NOTE the $$ escapes for docker-compose env interpolation.
      - traefik.http.middlewares.personal-mcp-auth.basicauth.users=rayo:$2y$05$YNclvfhPwZZW4vQkwcgAF..F9G5tN.JkB9j4WuuuFwVkDow4gkZf.
      - traefik.http.middlewares.personal-mcp-auth.basicauth.removeheader=true
      - traefik.http.routers.monarch-mcp.middlewares=personal-mcp-auth@docker

volumes:
  monarch-session:
    name: monarch-session

networks:
  coolify:
    external: true
